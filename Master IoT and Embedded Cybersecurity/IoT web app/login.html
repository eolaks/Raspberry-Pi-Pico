<!DOCTYPE html>
<html>
<head>
    <title>Login - Maaun Kano University</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #004080, #0073e6);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border-radius: 15px;
        }
        .footer-text {
            font-size: 13px;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4 shadow-lg login-card">

                <div class="text-center mb-3">
                    <img src="{{ url_for('static', filename='maaun_logo.jpg') }}"
                         width="100">
                </div>

                <h5 class="text-center mb-4">
                    IoT Monitoring Dashboard
                </h5>

                <!-- ✅ Error Alert -->
                {% if error %}
                <div class="alert alert-danger text-center" role="alert">
                    {{ error }} <br>
                    <strong>Please enter the correct login details.</strong>
                </div>
                {% endif %}

                <form method="POST">
                    <input type="text" 
                           name="username"
                           class="form-control mb-3"
                           placeholder="Username"
                           value="{{ request.form.username }}"
                           required>

                    <input type="password"
                           name="password"
                           class="form-control mb-3"
                           placeholder="Password"
                           required>

                    <button class="btn btn-primary w-100">
                        Login
                    </button>
                </form>
            </div>

            <div class="text-center footer-text">
                © 2026 Maaun Kano University
            </div>
        </div>
    </div>
</div>
</body>
</html>
